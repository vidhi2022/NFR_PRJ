<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Define Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0f2f5;
      margin: 0;
      padding: 20px;
    }

    .content-wrapper {
      max-width: 1200px;
      margin: auto;
      background: #fff;
      padding: 25px 30px;
      border-radius: 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .section-box {
      border: 1px solid #d0d7de;
      padding: 20px;
      margin-bottom: 30px;
      border-radius: 6px;
      background: #fafafa;
    }

    .section-title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 15px;
      padding: 5px 10px;
      display: inline-block;
      border: 1px solid #444;
      border-radius: 4px;
      background-color: #f2f2f2;
    }

    .form-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .form-group {
      flex: 1 1 45%;
    }

    label {
      font-weight: 500;
      font-size: 14px;
      display: block;
      margin-bottom: 5px;
    }

    input,
    select {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: white;
    }

    .btn-submit {
      padding: 10px 25px;
      background-color: #007bff;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      margin-top: 20px;
    }

    .btn-submit:hover {
      background-color: #0056b3;
    }

    @media (max-width: 768px) {
      .form-group {
        flex: 1 1 100%;
      }
    }
	
	.page-title {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: #2c3e50;
  margin-bottom: 25px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
  </style>
</head>
<body>

<div class="content-wrapper">
	<div class="section-box">
	<h1 class="page-title">Create New Project</h1>
	</div>
  <div class="section-box">
  
    <div class="section-title">Project Information</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" name="project_name">
      </div>
      <div class="form-group">
		  <label>Owner Department</label>
		  <select name="owner_dept_cd">
			<option value="">-- Select Department --</option>
			<option value="RNB">Road & Bridge</option>
			<option value="HSG">Housing</option>
			<option value="MECH">Mechanical</option>
		  </select>
	  </div>
      <div class="form-group">
        <label>Division Code</label>
		<select name="division_cd">
			<option value="">-- Select Division --</option>
			<option value="RNB">Div I</option>
			<option value="HSG">Div II</option>
			<option value="MECH">Div III</option>
		  </select>
      </div>
      <div class="form-group">
        <label>Parent Asset </label>
		<select name="parent_asset_cd">
			<option value="">-- Select Road --</option>
			<option value="RNB">Rd0001</option>
			<option value="HSG">Rd0002</option>
			<option value="MECH">Rd0003</option>
		  </select>
      </div>

      <div class="form-group">
        <label>Project Start Date</label>
        <input type="date" name="project_start_date">
      </div>
      <div class="form-group">
        <label>Project End Date</label>
        <input type="date" name="project_end_date">
      </div>
      <div class="form-group">
        <label>Project Status Code</label>
		<select name="project_status_cd">
			<option value="">-- Select Status --</option>
			<option value="RNB">In Progress</option>
			<option value="HSG">Completed</option>
			<option value="MECH">Cancelled</option>
		 </select>
      </div>
      <div class="form-group">
        <label>Project Awarded To</label>
        
		<select name="project_awarded_to">
			<option value="">-- Select Constructor --</option>
			<option value="RNB">M/s K. Nakhro & Sons</option>
			<option value="HSG">M/s LPSS</option>
			<option value="MECH">Naga Construction</option>
		 </select>
      </div>
    </div>
  </div>

  <div class="section-box">
    <div class="section-title">Site Incharge Details</div>
    <div class="form-grid">
	  <div class="form-group">
         <label>Site Incharge Office </label>
		 <select name="site_incharge_office_cd">
			<option value="">-- Select Office --</option>
			<option value="RNB">Site Eng Office1</option>
			<option value="HSG">Site Eng Office2</option>
			<option value="MECH">Site Eng Office3</option>
		 </select>
      </div>
      <div class="form-group">
        <label>Site Incharge Name</label>
        <input type="text" name="site_incharge_name">
      </div>
      
      <div class="form-group">
        <label>Site Incharge Phone No.</label>
        <input type="text" name="site_incharge_ph_no">
      </div>
      <div class="form-group">
        <label>Is Published</label>
        <select name="is_published">
          <option value="Y">Yes</option>
          <option value="N">No</option>
        </select>
      </div>
    </div>
  </div>
  
  <div class="section-box">
  <div class="section-title">Upload Documents</div>
  <div class="form-grid">
    <div class="form-group">
      <label>Upload Project Plan (PDF)</label>
      <input type="file" name="project_plan" accept=".pdf">
    </div>
    <div class="form-group">
      <label>Upload Site Images</label>
      <input type="file" name="site_images[]" multiple accept="image/*">
    </div>
    <div class="form-group">
      <label>Upload Work Order Document</label>
      <input type="file" name="work_order_doc" accept=".pdf,.doc,.docx">
    </div>
  </div>
</div>

	<form action="success.html" method="GET">
		<!-- your form inputs here -->
		<button type="submit" class="btn-submit">Submit</button>
	</form>
</div>

</body>
</html>
